receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Sends traces DIRECTLY to the Datadog trace intake, bypassing the
  # Datadog Agent's span forwarder (which delivers 0 payloads in this env).
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}
    traces:
      endpoint: "https://trace.agent.us5.datadoghq.com"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [datadog]
