name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: observai
          POSTGRES_PASSWORD: observai
          POSTGRES_DB: observai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check app/ tests/

      - name: Type check (pyright)
        run: .venv/bin/python -m pyright app/ alembic/

      - name: Test (unit)
        run: .venv/bin/python -m pytest tests/ -m "not datadog" -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://observai:observai@localhost:5432/observai

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run pre-commit
        run: pre-commit run --all-files

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend, pre-commit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-quality/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-quality/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-quality/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-quality/frontend:${{ github.sha }}
